<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>潮壳后台管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #131215; --surface: #1c1a1f; --surface-2: #232025;
    --coral: #FF5A5F; --lime: #D4FF3F; --lilac: #B8A6FF;
    --text: #F5F3EF; --muted: #9A97A0; --line: #322f36;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;}
  body{ -webkit-font-smoothing:antialiased; padding-bottom:60px; }

  /* ===== 登录遮罩 ===== */
  #gate{
    position:fixed; inset:0; background:var(--bg); z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; gap:12px;
  }
  #gate h1{ font-family:'Archivo Black',sans-serif; font-size:22px; margin-bottom:4px; }
  #gate input{
    width:100%; max-width:280px; background:var(--surface); border:1px solid var(--line);
    color:var(--text); padding:14px 16px; border-radius:12px; font-size:16px;
  }
  #gate button{
    width:100%; max-width:280px; background:var(--coral); color:var(--bg); font-weight:700;
    border:none; padding:14px; border-radius:12px; font-size:15px;
  }
  #gate .err{ color:var(--coral); font-size:13px; display:none; }
  #logoutBtn{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    font-size:12px; padding:6px 14px; border-radius:20px; margin-left:auto;
  }
  header{ display:flex; align-items:center; gap:12px; }
  header .header-text{ flex:1; }

  header{ padding:24px 16px 16px; border-bottom:1px solid var(--line); }
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--lime);
    letter-spacing:0.1em; text-transform:uppercase;
  }
  h1.title{ font-family:'Archivo Black',sans-serif; font-size:26px; margin-top:6px; }

  main{ padding:16px; max-width:640px; margin:0 auto; }

  .section-title{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);
    letter-spacing:0.08em; margin:24px 0 12px; display:flex; align-items:center; gap:8px;
  }
  .section-title::after{ content:''; flex:1; height:1px; background:var(--line); }

  .form-card{
    background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:14px;
  }
  .field{ margin-bottom:12px; }
  .field label{
    display:block; font-size:11px; color:var(--muted); margin-bottom:6px;
    font-family:'JetBrains Mono',monospace; letter-spacing:0.05em;
  }
  .field input, .field textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:10px; font-size:14px; font-family:'Inter',sans-serif;
  }
  .field textarea{ resize:vertical; min-height:60px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .btn{
    border:none; border-radius:10px; padding:11px 18px; font-weight:700; font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .btn-primary{ background:var(--lime); color:var(--bg); }
  .btn-danger{ background:transparent; color:var(--coral); border:1px solid var(--coral); }
  .btn-row{ display:flex; gap:10px; margin-top:4px; }

  .product-card{
    background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:14px;
  }
  .product-card-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }
  .product-card-head .name{ font-weight:700; font-size:15px; }
  .stock-pill{
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:3px 10px; border-radius:20px;
    background:var(--surface-2); color:var(--muted);
  }
  .stock-pill.low{ color:var(--coral); }

  .save-hint{ font-size:11px; color:var(--muted); margin-top:6px; display:none; }
  .save-hint.show{ display:block; color:var(--lime); }

  .empty{ text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; }
</style>
</head>
<body>

<div id="gate">
  <span class="eyebrow">CHAOKE ADMIN</span>
  <h1>后台登录</h1>
  <input type="email" id="emailInput" placeholder="管理员邮箱" autocomplete="username">
  <input type="password" id="pwInput" placeholder="密码" autocomplete="current-password">
  <button onclick="tryLogin()">登录</button>
  <p class="err" id="pwErr">邮箱或密码不对，再试一次</p>
</div>

<header>
  <div class="header-text">
    <span class="eyebrow">CHAOKE · ADMIN</span>
    <h1 class="title">商品后台管理</h1>
  </div>
  <button id="logoutBtn" onclick="logout()">退出登录</button>
</header>

<main>
  <div class="section-title">添加新商品</div>
  <div class="form-card">
    <div class="row2">
      <div class="field"><label>商品名称</label><input id="new_name" placeholder="例：热力珊瑚 磨砂壳"></div>
      <div class="field"><label>价格 ¥</label><input id="new_price" type="number" step="0.1" placeholder="39"></div>
    </div>
    <div class="row2">
      <div class="field"><label>机型 model</label><input id="new_model" placeholder="15pro / 15 / 14 / 13"></div>
      <div class="field"><label>颜色 color</label><input id="new_color" placeholder="珊瑚 / 青柠 / 紫雾…"></div>
    </div>
    <div class="row2">
      <div class="field"><label>材质 material</label><input id="new_material" placeholder="磨砂 / 硅胶 / 透明"></div>
      <div class="field"><label>库存 stock</label><input id="new_stock" type="number" placeholder="10"></div>
    </div>
    <div class="field"><label>分类 category</label><input id="new_category" placeholder="例：iPhone手机壳"></div>
    <div class="field"><label>图片链接 image（暂时没有可留空）</label><input id="new_image" placeholder="https://..."></div>
    <div class="field"><label>描述 description</label><textarea id="new_description" placeholder="例：四角防摔，手感细腻"></textarea></div>
    <button class="btn btn-primary" onclick="addProduct()" style="width:100%;">+ 添加商品</button>
  </div>

  <div class="section-title">已有商品 · <span id="countLabel">0</span> 款</div>
  <div id="productList"></div>
  <div class="empty" id="emptyMsg" style="display:none;">还没有商品，先在上面添加一个吧</div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDSBnQWVNRrhuX2Bv5lfq6aBUe-rMEOQWE",
    authDomain: "febshop-67382.firebaseapp.com",
    projectId: "febshop-67382",
    storageBucket: "febshop-67382.firebasestorage.app",
    messagingSenderId: "426734023224",
    appId: "1:426734023224:web:b677aa7a9134cd152deccd"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function tryLogin(){
    const email = document.getElementById('emailInput').value.trim();
    const pw = document.getElementById('pwInput').value;
    document.getElementById('pwErr').style.display = 'none';
    auth.signInWithEmailAndPassword(email, pw).catch(err => {
      document.getElementById('pwErr').textContent = '登录失败：邮箱或密码不对';
      document.getElementById('pwErr').style.display = 'block';
    });
  }
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') tryLogin();
  });

  function logout(){ auth.signOut(); }

  auth.onAuthStateChanged(user => {
    document.getElementById('gate').style.display = user ? 'none' : 'flex';
  });

  const productList = document.getElementById('productList');
  const countLabel = document.getElementById('countLabel');
  const emptyMsg = document.getElementById('emptyMsg');

  function fieldRow(id, label, value, type='text'){
    return `
      <div class="field">
        <label>${label}</label>
        <input id="${id}" type="${type}" value="${(value ?? '').toString().replace(/"/g,'&quot;')}">
      </div>
    `;
  }

  function renderProduct(doc){
    const p = doc.data();
    const id = doc.id;
    const soldOut = Number(p.stock) <= 0;
    const wrapper = document.createElement('div');
    wrapper.className = 'product-card';
    wrapper.innerHTML = `
      <div class="product-card-head">
        <span class="name">${(p.name || '未命名').toString()}</span>
        <span class="stock-pill ${soldOut || Number(p.stock) <= 3 ? 'low' : ''}">库存 ${p.stock ?? 0}</span>
      </div>
      <div class="row2">
        ${fieldRow(id+'_name', '商品名称', p.name)}
        ${fieldRow(id+'_price', '价格 ¥', p.price, 'number')}
      </div>
      <div class="row2">
        ${fieldRow(id+'_model', '机型 model', p.model)}
        ${fieldRow(id+'_color', '颜色 color', p.color)}
      </div>
      <div class="row2">
        ${fieldRow(id+'_material', '材质 material', p.material)}
        ${fieldRow(id+'_stock', '库存 stock', p.stock, 'number')}
      </div>
      <div class="field">
        <label>分类 category</label>
        <input id="${id}_category" value="${(p.category ?? '').toString().replace(/"/g,'&quot;')}">
      </div>
      <div class="field">
        <label>图片链接 image</label>
        <input id="${id}_image" value="${(p.image ?? '').toString().replace(/"/g,'&quot;')}">
      </div>
      <div class="field">
        <label>描述 description</label>
        <textarea id="${id}_description">${(p.description ?? '').toString()}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" data-action="save" data-id="${id}">保存修改</button>
        <button class="btn btn-danger" data-action="delete" data-id="${id}">删除商品</button>
      </div>
      <div class="save-hint" id="${id}_hint">已保存 ✓</div>
    `;
    return wrapper;
  }

  function saveProduct(id){
    const get = key => document.getElementById(id+'_'+key).value;
    const updated = {
      name: get('name'),
      price: parseFloat(get('price')) || 0,
      model: get('model'),
      color: get('color'),
      material: get('material'),
      stock: parseInt(get('stock')) || 0,
      category: get('category'),
      image: get('image'),
      description: get('description')
    };
    db.collection('products').doc(id).update(updated).then(() => {
      const hint = document.getElementById(id+'_hint');
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 1800);
    }).catch(err => alert('保存失败：' + err.message));
  }

  function deleteProduct(id){
    if(!confirm('确定要删除这个商品吗？删除后不能恢复。')) return;
    db.collection('products').doc(id).delete().catch(err => alert('删除失败：' + err.message));
  }

  productList.addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const id = btn.dataset.id;
    if(btn.dataset.action === 'save') saveProduct(id);
    if(btn.dataset.action === 'delete') deleteProduct(id);
  });

  function addProduct(){
    const name = document.getElementById('new_name').value.trim();
    if(!name){ alert('请先填写商品名称'); return; }
    const newDoc = {
      name,
      price: parseFloat(document.getElementById('new_price').value) || 0,
      model: document.getElementById('new_model').value.trim(),
      color: document.getElementById('new_color').value.trim(),
      material: document.getElementById('new_material').value.trim(),
      stock: parseInt(document.getElementById('new_stock').value) || 0,
      category: document.getElementById('new_category').value.trim(),
      image: document.getElementById('new_image').value.trim(),
      description: document.getElementById('new_description').value.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    db.collection('products').add(newDoc).then(() => {
      ['new_name','new_price','new_model','new_color','new_material','new_stock','new_category','new_image','new_description']
        .forEach(id => document.getElementById(id).value = '');
    }).catch(err => alert('添加失败：' + err.message));
  }

  db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
    productList.innerHTML = '';
    countLabel.textContent = snapshot.size;
    emptyMsg.style.display = snapshot.size === 0 ? 'block' : 'none';
    snapshot.forEach(doc => productList.appendChild(renderProduct(doc)));
  }, err => {
    productList.innerHTML = `<div class="empty">加载失败：${err.message}</div>`;
  });
</script>

</body>
</html>
